<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Скрининг пациента</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            gap: 20px;
            padding: 20px;
            background: #f4f7f9;
        }

        .form-container,
        .result-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(172, 64, 64, 0.1);
        }

        .form-container {
            width: 300px;
        }

        .result-container {
            flex-grow: 1;
            min-width: 400px;
            display: none;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .progress-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4a6cf7;
            transition: width 0.5s;
        }

        .trigger {
            font-size: 0.8em;
            background: #e8efff;
            color: #4a6cf7;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 10px;
        }

        .advice-item {
            border-left: 4px solid #4a6cf7;
            padding-left: 10px;
            margin: 10px 0;
            color: #333;
        }
    </style>
    
</head>

<body>
    <a href="/dashboard">Перейти к аналитике</a>.

    <div class="form-container">
        <h3>Анкета пациента</h3>
        Возраст <input type="number" id="age" value="22">
        Рост (см) <input type="number" id="height" value="180">
        Вес (кг) <input type="number" id="weight" value="80">
        Размер стопы <input type="number" id="foot_size" value="43">
        Пол <select id="sex">
            <option value="1">Мужской</option>
            <option value="0">Женский</option>
        </select>
        <button onclick="sendData()">Рассчитать</button>
    </div>

    <div id="results" class="result-container">
        <h2>Результаты скрининга <span style="float:right; font-size: 0.6em;">ИМТ: <span id="res_bmi"></span></span>
        </h2>
        <div id="top_results"></div>
        <div id="recommendations" style="margin-top: 20px;">
            <h3 style="color: #007bff;">Рекомендации системы:</h3>
            <div id="advice_list"></div>
        </div>
    </div>

    <script>
        async function sendData() {
            const payload = {
                features: [
                    parseFloat(document.getElementById('age').value),
                    parseFloat(document.getElementById('height').value),
                    parseFloat(document.getElementById('weight').value),
                    parseFloat(document.getElementById('foot_size').value),
                    parseInt(document.getElementById('sex').value)
                ]
            };

            const response = await fetch('/api/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            if (data.status === 'success') {
                document.getElementById('results').style.display = 'block';
                document.getElementById('res_bmi').innerText = data.bmi_calculated;

                // Отрисовка Топ-3
                const topDiv = document.getElementById('top_results');
                topDiv.innerHTML = '';
                data.prediction.top_results.forEach(res => {
                    topDiv.innerHTML += `
                    <div>
                        <strong>${res.group}</strong> <span class="trigger">Триггер: ${res.trigger}</span> 
                        <span style="float:right">${res.probability}%</span>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${res.probability}%"></div></div>
                    </div>`;
                });

                // Отрисовка советов
                const adviceDiv = document.getElementById('advice_list');
                adviceDiv.innerHTML = '';
                data.prediction.recommendations.forEach(text => {
                    adviceDiv.innerHTML += `<div class="advice-item">${text}</div>`;
                });
            }
        }
    </script>
</body>

</html>
