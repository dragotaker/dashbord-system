{% extends "base.html" %}
{% block title %}Аналитика - OrthoScreen{% endblock %}
{% block nav_dashboard %}active{% endblock %}
{% block content %}
<div class="dashboard-container">
    <div class="stats-grid">
        <div class="stat-card"><h3>Всего</h3><p id="statTotal">-</p></div>
        <div class="stat-card"><h3>Возраст</h3><p id="statAge">-</p></div>
        <div class="stat-card"><h3>ИМТ</h3><p id="statBMI">-</p></div>
        <div class="stat-card"><h3>Топ</h3><p id="statTop">-</p></div>
    </div>
    <div class="charts-grid">
        <div class="chart-card"><h2>Патологии</h2><canvas id="mainChart"></canvas></div>
        <div class="chart-card"><h2>Возраст</h2><canvas id="ageChart"></canvas></div>
        <div class="chart-card"><h2>ИМТ</h2><canvas id="bmiChart"></canvas></div>
    </div>
    <section id="detailsSection" style="display: none;">
        <div class="chart-card">
            <h2 id="detailsTitle">Детали</h2>
            <canvas id="detailsChart"></canvas>
            <button onclick="closeDetails()">Закрыть</button>
        </div>
    </section>
</div>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% endblock %}
