tags:
  - Analytics
summary: Распределение данных для гистограмм
description: Возвращает массив меток (бинов) и количество пациентов в каждом из них.
parameters:
  - name: start
    in: query
    type: string
  - name: end
    in: query
    type: string
responses:
  200:
    description: Данные для отрисовки графиков
    schema:
      properties:
        labels:
          type: array
          items: {type: string}
          example: ["Дети", "Молодежь", "Взрослые", "Пожилые"]
        values:
          type: array
          items: {type: integer}
          example: [10, 45, 80, 15]